services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    container_name: workbridge-worker
    restart: unless-stopped
    volumes:
      - ${WORKBRIDGE_WORKSPACE_DIR:-/home/ubuntu/repo}:/workspace:rw
      - ./config.toml:/etc/workbridge/worker.toml:ro
    environment:
      - WORKBRIDGE_CONFIG=/etc/workbridge/worker.toml
