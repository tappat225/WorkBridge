services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: capown-worker
    image: capown-worker
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${CAPOWN_HOST_WORKSPACE:-${HOME}/.capown/workspace}:${CAPOWN_CONTAINER_WORKSPACE:-/workspace}:rw
      - ${CAPOWN_WORKER_CONFIG:-./config.toml}:/etc/capown/worker.toml:ro
    environment:
      - CAPOWN_CONFIG=/etc/capown/worker.toml
