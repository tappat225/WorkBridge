services:
  master:
    build:
      context: ..
      dockerfile: master/Dockerfile
    container_name: workbridge-master
    restart: unless-stopped
    ports:
      - "127.0.0.1:9210:9210"
    volumes:
      - master-data:/app/data
      - ./config.toml:/etc/workbridge/master.toml:ro
    environment:
      - WORKBRIDGE_CONFIG=/etc/workbridge/master.toml

volumes:
  master-data:
