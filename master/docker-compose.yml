services:
  master:
    build:
      context: ..
      dockerfile: master/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: capown-master
    image: capown-master
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${CAPOWN_MASTER_DATA:-./data}:/app/data
      - ${CAPOWN_MASTER_CONFIG:-./config.toml}:/etc/capown/master.toml:ro
    environment:
      - CAPOWN_CONFIG=/etc/capown/master.toml
